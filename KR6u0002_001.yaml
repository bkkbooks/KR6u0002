body:
  text: 者信佛妙法受習不忘六者不貪世榮斷俗因緣七者願習聖慧為一切護八者願集衆生為作倡道九者在所墮生常願值佛十者守持禁戒廣度群生十一者博學衆智宣示四輩十二者常願與佛世世相值廣說道要度人無量是為十二聖慧者佛告阿難若有比丘尼優婆塞優婆夷國王子及諸婇女有能奉行此十二法者在所墮生常得值佛周旋教化長離衆苦入三法門功得成就疾得至佛猶步三界無所罣礙無能斷者自五前世修行此事自致得佛若有國王大臣長者中宮眷屬及諸善男子善女人四部弟子欲求此無上道廣度一切者亦當讀此經欲求三乘法者亦當讀此經欲求早度世取無為者亦當讀此經欲求上生妙樂天上者亦當讀此經欲求轉輪聖王者亦當讀此經欲求尊貴富者亦當讀此經若有女人求男子身者亦當讀此經欲求世世常與明師相隨教化者亦當讀此經如是一切諸願所欲者皆當讀此經此經尊猛善男子善女人能奉行持此經者常為十方現在諸佛威神所護亦為過去七佛所護及諸尊菩薩大弟子所護為又天龍鬼神日月五星二十八宿一切諸尊天等常隨擁護讀是經者終不令橫死一切衆邪皆不得嬈害是善男子善女人行菩薩之道故十方衆聖皆共護視讀是經者功德無量佛不二言聞是經者受持者書寫者所願悉得阿難汝好諦聽諦聽受持是經勤教一切人受學諷誦讀之汝莫忘墮阿難即言受天尊教佛說是經時坐中有長者女名曰善信與五百同輩一時即起稽首佛足五體投地長跪白佛言世尊信等女人罪穢嬰身蒙佛慈恩得聞聖法不以女賤願為弟子佛言善來諸女汝宿有福應得值佛樂聞法者真得度苦生生之處遠離女身佛受五戒為清信女衆會無不歡喜各前以頭面著地悉受五戒佛告阿難善信女等久生於世未聞佛時未聞法時為怨師所怪隨世因緣或毀滅正法或破塔寺或殺真人或負三尊財物或殺父母或犯衆怨不自覺智所作衆罪不可稱計今得見佛心開意解及知前世所行為非信等同輩自今以後改住修來奉佛尊戒并持此經世世不犯願佛哀愍悉賜五戒佛告諸女汝諦聽受持一者守仁不殺恩及群生二者義護不盜損己濟衆三者貞潔不淫行無沾污四者言不詳䛴不犯口過五者遠酒不飲不犯衆怨修奉齊戒常行大慈呪願一切尊修佛語終不中悔任力所能寧守善而死不犯怨而生汝等以來持佛禁戒諸天所嘆莫德隨俗邪罔跪拜鬼神護持禁戒如拔頭然坐自觀身形不久立色不久解命如風遇少疾如裏勿持容恣自處怨行萬物無常當建精進棄損世念如菩薩行所願發心今世後世欲求何等如願悉得終不虛也佛告阿難汝等護行可得至佛佛道不可不學經法不可不讀吾今得佛但積學所致大乘妙法無男無女無貴無賤聞是經者諸佛加護所願悉得佛說是經時天龍鬼神帝王人及四部弟子有三億人見佛說是經皆大歡喜嘆未曾有各發無上正真道意前以頭面著地作禮奉行佛告阿難汝諦聽受持廣宣流布令一切衆生有形之類受持讀誦書寫供養佛之要法能除無數劫極重之罪能度無量無邊阿僧祇衆生悉得解脫此經佛口中所出有讀一句一偈讀嘆之者衆邪違道一切怨鬼不得來近壽命正長終不橫死所欲求者如願悉得說是經時一切大衆及諸龍鬼神四部弟子頂禮佛足受天尊教一心奉行正光二年十二月十五日信士張阿宜寫護身命經受持讀誦供養經上及七世父母下及己身皆誠善㖒之道
